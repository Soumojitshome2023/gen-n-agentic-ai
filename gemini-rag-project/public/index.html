<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gemini RAG - Chat with PDF</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f4f8;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
      min-height: 100vh;
    }

    h1 {
      margin-bottom: 6px;
      color: #1a1a2e;
    }

    .subtitle {
      color: #666;
      font-size: 14px;
      margin-bottom: 20px;
    }

    .badge {
      display: inline-block;
      background: #e8f5e9;
      color: #2e7d32;
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 600;
    }

    /* ===== Upload Section ===== */
    .upload-section {
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
      width: 85%;
      max-width: 750px;
      text-align: center;
      margin-bottom: 20px;
    }

    .upload-section h2 {
      margin-bottom: 15px;
      color: #333;
      font-size: 18px;
    }

    .upload-area {
      border: 2px dashed #bbb;
      border-radius: 10px;
      padding: 35px 20px;
      cursor: pointer;
      transition: all 0.3s;
      margin-bottom: 15px;
      background: #fafafa;
    }

    .upload-area:hover {
      border-color: #4285f4;
      background: #f0f6ff;
    }

    .upload-area.dragover {
      border-color: #4285f4;
      background: #e8f0fe;
    }

    .upload-area .icon {
      font-size: 42px;
      margin-bottom: 8px;
    }

    .upload-area p {
      color: #777;
      font-size: 14px;
    }

    .file-name {
      color: #333;
      font-weight: 600;
      margin-top: 8px;
      display: none;
      font-size: 14px;
    }

    .btn {
      border: none;
      padding: 12px 28px;
      border-radius: 8px;
      font-size: 15px;
      cursor: pointer;
      transition: all 0.3s;
      font-weight: 500;
    }

    .btn-primary {
      background: #4285f4;
      color: white;
    }

    .btn-primary:hover {
      background: #3367d6;
    }

    .btn:disabled {
      background: #ccc;
      cursor: not-allowed;
    }

    .status {
      margin-top: 12px;
      padding: 10px 14px;
      border-radius: 8px;
      display: none;
      font-size: 14px;
      text-align: left;
    }

    .status.success {
      background: #e8f5e9;
      color: #2e7d32;
      display: block;
    }

    .status.error {
      background: #ffebee;
      color: #c62828;
      display: block;
    }

    .status.loading {
      background: #fff3e0;
      color: #e65100;
      display: block;
    }

    /* ===== Chat Section ===== */
    .chat-section {
      background: white;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
      width: 85%;
      max-width: 750px;
      display: none;
      flex-direction: column;
      overflow: hidden;
    }

    .chat-header {
      background: #4285f4;
      color: white;
      padding: 14px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .chat-header h2 {
      font-size: 16px;
      font-weight: 500;
    }

    .btn-clear {
      background: rgba(255, 255, 255, 0.15);
      color: white;
      border: 1px solid rgba(255, 255, 255, 0.3);
      padding: 5px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      transition: background 0.3s;
    }

    .btn-clear:hover {
      background: rgba(255, 255, 255, 0.25);
    }

    #chatbox {
      height: 420px;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      background: #f8f9fa;
    }

    .msg {
      padding: 12px 16px;
      border-radius: 12px;
      max-width: 82%;
      word-wrap: break-word;
      white-space: pre-wrap;
      font-size: 14px;
      line-height: 1.6;
    }

    .user {
      align-self: flex-end;
      background: #e3f2fd;
      color: #1565c0;
      border-bottom-right-radius: 4px;
    }

    .ai {
      align-self: flex-start;
      background: #f1f8e9;
      color: #33691e;
      border-bottom-left-radius: 4px;
    }

    .system {
      align-self: center;
      background: #fff8e1;
      color: #f57f17;
      font-size: 13px;
      font-style: italic;
      max-width: 90%;
      text-align: center;
    }

    /* Source chips */
    .sources {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 8px;
    }

    .source-chip {
      background: #e8f5e9;
      color: #2e7d32;
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 500;
      cursor: help;
    }

    #loader {
      display: none;
      color: #999;
      font-style: italic;
      padding: 6px 16px;
      font-size: 13px;
    }

    .input-area {
      display: flex;
      padding: 14px;
      gap: 10px;
      border-top: 1px solid #eee;
      background: white;
    }

    .input-area input {
      flex: 1;
      padding: 12px 16px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.3s;
    }

    .input-area input:focus {
      border-color: #4285f4;
    }

    .btn-send {
      background: #4285f4;
      color: white;
      border: none;
      padding: 12px 22px;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.3s;
    }

    .btn-send:hover {
      background: #3367d6;
    }

    .btn-send:disabled {
      background: #ccc;
      cursor: not-allowed;
    }
  </style>
</head>

<body>
  <h1>🧠 Gemini RAG</h1>
  <p class="subtitle">Chat with your PDF using pure Gemini — <span class="badge">No External DB</span></p>

  <!-- Upload Section -->
  <div class="upload-section">
    <h2>📁 Upload Your PDF</h2>
    <div class="upload-area" id="uploadArea">
      <div class="icon">📄</div>
      <p>Drag & drop a PDF here, or click to select</p>
      <p class="file-name" id="fileName"></p>
    </div>
    <input type="file" id="pdfInput" accept=".pdf" hidden>
    <button class="btn btn-primary" id="uploadBtn" disabled>Upload & Index</button>
    <div class="status" id="uploadStatus"></div>
  </div>

  <!-- Chat Section -->
  <div class="chat-section" id="chatSection">
    <div class="chat-header">
      <h2 id="chatTitle">💬 Chat with your PDF</h2>
      <button class="btn-clear" onclick="clearAll()">Clear & Reset</button>
    </div>
    <div id="chatbox">
      <div class="msg system">PDF indexed in memory! Ask any question about your document.</div>
    </div>
    <div id="loader">AI is thinking...</div>
    <div class="input-area">
      <input type="text" id="userInput" placeholder="Ask something about the PDF..."
        onkeydown="if(event.key==='Enter') sendMsg()">
      <button class="btn-send" id="sendBtn" onclick="sendMsg()">Send</button>
    </div>
  </div>

  <script>
    const uploadArea = document.getElementById('uploadArea');
    const pdfInput = document.getElementById('pdfInput');
    const uploadBtn = document.getElementById('uploadBtn');
    const fileName = document.getElementById('fileName');
    const uploadStatus = document.getElementById('uploadStatus');

    let selectedFile = null;

    // ===== Drag & Drop =====
    uploadArea.addEventListener('click', () => pdfInput.click());

    uploadArea.addEventListener('dragover', (e) => {
      e.preventDefault();
      uploadArea.classList.add('dragover');
    });

    uploadArea.addEventListener('dragleave', () => {
      uploadArea.classList.remove('dragover');
    });

    uploadArea.addEventListener('drop', (e) => {
      e.preventDefault();
      uploadArea.classList.remove('dragover');
      const file = e.dataTransfer.files[0];
      if (file && file.type === 'application/pdf') {
        selectFile(file);
      } else {
        showStatus('Please drop a PDF file.', 'error');
      }
    });

    pdfInput.addEventListener('change', (e) => {
      if (e.target.files[0]) selectFile(e.target.files[0]);
    });

    function selectFile(file) {
      selectedFile = file;
      fileName.textContent = `Selected: ${file.name}`;
      fileName.style.display = 'block';
      uploadBtn.disabled = false;
      uploadStatus.className = 'status';
    }

    // ===== Upload PDF =====
    uploadBtn.addEventListener('click', async () => {
      if (!selectedFile) return;

      uploadBtn.disabled = true;
      showStatus('⏳ Uploading and embedding chunks... This may take a moment.', 'loading');

      const formData = new FormData();
      formData.append('pdf', selectedFile);

      try {
        const res = await fetch('/upload', { method: 'POST', body: formData });
        const data = await res.json();

        if (res.ok) {
          showStatus(`✅ ${data.message} (${data.chunks} chunks embedded in memory)`, 'success');
          document.getElementById('chatSection').style.display = 'flex';
          document.getElementById('chatTitle').textContent = `💬 ${data.filename}`;
        } else {
          showStatus(`❌ ${data.error}`, 'error');
          uploadBtn.disabled = false;
        }
      } catch (err) {
        showStatus(`❌ Upload failed: ${err.message}`, 'error');
        uploadBtn.disabled = false;
      }
    });

    function showStatus(msg, type) {
      uploadStatus.textContent = msg;
      uploadStatus.className = `status ${type}`;
    }

    // ===== Chat =====
    async function sendMsg() {
      const input = document.getElementById('userInput');
      const chatbox = document.getElementById('chatbox');
      const loader = document.getElementById('loader');
      const btn = document.getElementById('sendBtn');
      const msg = input.value.trim();

      if (!msg) return;

      chatbox.innerHTML += `<div class="msg user">${escapeHtml(msg)}</div>`;
      input.value = '';
      loader.style.display = 'block';
      btn.disabled = true;
      chatbox.scrollTop = chatbox.scrollHeight;

      try {
        const res = await fetch('/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: msg })
        });
        const data = await res.json();

        if (res.ok) {
          // Build AI message with sources
          let aiHtml = `<div class="msg ai">${escapeHtml(data.response)}`;

          if (data.sources && data.sources.length > 0) {
            aiHtml += `<div class="sources">`;
            data.sources.forEach((s) => {
              aiHtml += `<span class="source-chip" title="${escapeHtml(s.preview)}">📎 Chunk ${s.chunk} (${s.score})</span>`;
            });
            aiHtml += `</div>`;
          }

          aiHtml += `</div>`;
          chatbox.innerHTML += aiHtml;
        } else {
          chatbox.innerHTML += `<div class="msg system">Error: ${escapeHtml(data.error)}</div>`;
        }
      } catch (err) {
        chatbox.innerHTML += `<div class="msg system">Error: ${escapeHtml(err.message)}</div>`;
      }

      loader.style.display = 'none';
      btn.disabled = false;
      chatbox.scrollTop = chatbox.scrollHeight;
    }

    // ===== Clear =====
    async function clearAll() {
      if (!confirm('This will clear all indexed data and chat history. Continue?')) return;

      try {
        const res = await fetch('/clear', { method: 'DELETE' });
        const data = await res.json();

        if (res.ok) {
          document.getElementById('chatbox').innerHTML =
            '<div class="msg system">Memory cleared. Upload a new PDF to start.</div>';
          document.getElementById('chatSection').style.display = 'none';

          selectedFile = null;
          fileName.style.display = 'none';
          uploadBtn.disabled = true;
          pdfInput.value = '';
          uploadStatus.className = 'status';
        }
      } catch (err) {
        alert('Failed to clear: ' + err.message);
      }
    }

    // ===== Utility =====
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
  </script>
</body>

</html>
