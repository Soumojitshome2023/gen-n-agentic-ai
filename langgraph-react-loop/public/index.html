<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LangGraph ReAct Loop Console</title>
  <style>
    :root {
      --bg: #090d16;
      --card-bg: #111827;
      --border: #1f2937;
      --text: #f3f4f6;
      --text-muted: #9ca3af;
      --indigo: #6366f1;
      --warning: #fbbf24;
      --emerald: #10b981;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      padding: 30px;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      margin-bottom: 30px;
    }

    header h1 {
      font-size: 28px;
      color: white;
      margin-bottom: 5px;
    }

    header p {
      color: var(--text-muted);
    }

    /* --- Form Panel --- */
    .input-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 25px;
    }

    .form-group {
      display: flex;
      gap: 10px;
    }

    input[type="text"] {
      flex: 1;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #090d16;
      color: white;
      font-size: 15px;
    }

    .btn {
      background: var(--indigo);
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .btn:hover {
      opacity: 0.9;
    }

    .btn:disabled {
      background: #374151;
      cursor: not-allowed;
    }

    .examples {
      margin-top: 15px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .example-btn {
      background: #090d16;
      border: 1px solid var(--border);
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 12px;
      color: var(--text-muted);
      cursor: pointer;
    }

    .example-btn:hover {
      color: white;
      border-color: var(--indigo);
    }

    /* --- Loader --- */
    .loader {
      display: none;
      align-items: center;
      gap: 10px;
      margin-top: 15px;
      color: var(--warning);
      font-size: 14px;
      font-weight: 500;
    }

    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid rgba(251, 191, 36, 0.2);
      border-top-color: var(--warning);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* --- Graph Visualizer --- */
    .graph-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 25px;
      display: none;
    }

    .graph-nodes {
      display: flex;
      justify-content: space-between;
      align-items: center;
      max-width: 600px;
      margin: 0 auto;
      padding: 20px 0;
      position: relative;
    }

    .node {
      padding: 10px 18px;
      border-radius: 8px;
      background: #1f2937;
      border: 1px solid var(--border);
      font-size: 13px;
      font-weight: 600;
      color: var(--text-muted);
      transition: all 0.3s;
    }

    .node.active {
      background: rgba(99, 102, 241, 0.15);
      border-color: var(--indigo);
      color: white;
      box-shadow: 0 0 12px rgba(99, 102, 241, 0.4);
    }

    .arrow {
      color: var(--border);
      font-size: 18px;
      font-weight: bold;
    }

    .loop-back {
      position: absolute;
      bottom: -10px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 12px;
      color: var(--warning);
      display: flex;
      align-items: center;
      gap: 6px;
      opacity: 0.5;
      transition: opacity 0.3s;
    }

    .loop-back.active {
      opacity: 1;
      font-weight: bold;
    }

    /* --- Logs Panel --- */
    .logs-panel {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      display: none;
    }

    .logs-panel h2 {
      font-size: 16px;
      margin-bottom: 15px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 8px;
    }

    .trace-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .trace-step {
      background: #090d16;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
    }

    .trace-header {
      font-size: 11px;
      font-weight: bold;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .trace-step.user .trace-header { color: var(--indigo); }
    .trace-step.agent .trace-header { color: var(--emerald); }
    .trace-step.tool .trace-header { color: var(--warning); }

    .trace-body {
      font-size: 13.5px;
      white-space: pre-wrap;
      word-break: break-all;
    }
  </style>
</head>

<body>
  <div class="container">
    <header>
      <h1>🔁 LangGraph ReAct Loop Console</h1>
      <p>Observe state-based conditional routing and cyclic graph execution loops</p>
    </header>

    <!-- Input Box -->
    <div class="input-card">
      <div class="form-group">
        <input type="text" id="promptInput" placeholder="Enter a task (e.g. 'Solve 15 * 30 + 5' or 'What is the weather in London?' or 'Get current time')...">
        <button class="btn" id="runBtn" onclick="runGraphLoop()">Run Graph</button>
      </div>

      <!-- Loader -->
      <div class="loader" id="agentLoader">
        <span class="spinner"></span>
        <span id="loaderStatusText">Agent loop starting...</span>
      </div>

      <div class="examples">
        <button class="example-btn" onclick="setExample(this)">Calculate 125 * 8 + 450</button>
        <button class="example-btn" onclick="setExample(this)">What is the current weather in London?</button>
        <button class="example-btn" onclick="setExample(this)">What is the current system time and timezone?</button>
      </div>
    </div>

    <!-- Graph Diagram -->
    <div class="graph-card" id="graphCard">
      <div class="graph-nodes">
        <div class="node" id="node-start">Start</div>
        <span class="arrow">▶</span>
        <div class="node" id="node-agent">Agent Node</div>
        <span class="arrow">▶</span>
        <div class="node" id="node-action">Action Node</div>
        <span class="arrow">▶</span>
        <div class="node" id="node-end">End</div>
        <div class="loop-back" id="node-loop">◀ Loop back to Agent</div>
      </div>
    </div>

    <!-- Execution Logs -->
    <div class="logs-panel" id="logsPanel">
      <h2>📜 State Graph Trace Logs</h2>
      <div class="trace-list" id="traceList"></div>
    </div>
  </div>

  <script>
    function setExample(btn) {
      document.getElementById('promptInput').value = btn.textContent;
    }

    async function runGraphLoop() {
      const promptVal = document.getElementById('promptInput').value.trim();
      const runBtn = document.getElementById('runBtn');
      const agentLoader = document.getElementById('agentLoader');
      const loaderStatusText = document.getElementById('loaderStatusText');
      const graphCard = document.getElementById('graphCard');
      const logsPanel = document.getElementById('logsPanel');
      const traceList = document.getElementById('traceList');

      if (!promptVal) return;

      runBtn.disabled = true;
      agentLoader.style.display = 'flex';
      graphCard.style.display = 'block';
      logsPanel.style.display = 'block';
      traceList.innerHTML = '<div style="color: var(--text-muted); text-align: center;">Initializing Graph...</div>';
      
      resetNodes();

      try {
        // Step 1: Start node active
        setActiveNode('start');
        loaderStatusText.textContent = 'Agent Node is reasoning...';
        await sleep(1000);

        // Step 2: Agent Node is active
        setActiveNode('agent');

        // Fire request to execute the ReAct graph loop on the server
        const res = await fetch('/api/run-loop', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ prompt: promptVal })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error);

        // Simulated loop walkthrough so the user can see transitions
        let toolRuns = data.steps.filter(s => s.type === 'tool').length;

        for (let i = 0; i < toolRuns; i++) {
          loaderStatusText.textContent = `Action Node executing tool call #${i + 1}...`;
          setActiveNode('action');
          await sleep(1200);
          
          loaderStatusText.textContent = 'Looping back to Agent Node...';
          document.getElementById('node-loop').className = 'loop-back active';
          await sleep(1000);
          
          setActiveNode('agent');
          await sleep(1000);
        }

        // Complete graph
        loaderStatusText.textContent = 'Routing to End node...';
        setActiveNode('end');
        await sleep(800);

        // Render full server execution steps logs
        renderTraceLogs(data.steps);

      } catch (err) {
        alert('ReAct loop execution failed: ' + err.message);
      } finally {
        runBtn.disabled = false;
        agentLoader.style.display = 'none';
      }
    }

    function resetNodes() {
      document.getElementById('node-start').className = 'node';
      document.getElementById('node-agent').className = 'node';
      document.getElementById('node-action').className = 'node';
      document.getElementById('node-end').className = 'node';
      document.getElementById('node-loop').className = 'loop-back';
    }

    function setActiveNode(nodeId) {
      resetNodes();
      document.getElementById(`node-${nodeId}`).className = 'node active';
    }

    function renderTraceLogs(steps) {
      const traceList = document.getElementById('traceList');
      traceList.innerHTML = '';
      steps.forEach(step => {
        const hasTools = step.toolCalls && step.toolCalls.length > 0;
        let title = 'Unknown';
        if (step.type === 'user') title = 'User Prompt (Graph Input)';
        if (step.type === 'agent') title = hasTools ? 'Agent Node (Tool Call Requested)' : 'Agent Node (Final Answer)';
        if (step.type === 'tool') title = 'Action Node (Tool Execution Result)';

        let content = step.content;
        if (hasTools) {
          content = `Requested tool ${step.toolCalls[0].name}() with args: ${JSON.stringify(step.toolCalls[0].args)}`;
        }

        traceList.innerHTML += `
          <div class="trace-step ${step.type}">
            <div class="trace-header">Step ${step.stepIndex} - ${title}</div>
            <div class="trace-body">${content}</div>
          </div>`;
      });
    }

    function sleep(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }
  </script>
</body>

</html>
