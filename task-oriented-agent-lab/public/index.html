<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task-Oriented Agent Lab</title>
  <style>
    :root {
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --bg: #0f172a;
      --card-bg: #1e293b;
      --text: #f8fafc;
      --text-muted: #94a3b8;
      --border: #334155;
      --success: #10b981;
      --warning: #f59e0b;
      --indigo: #6366f1;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Outfit', 'Segoe UI', system-ui, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      line-height: 1.5;
      padding: 40px 20px;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      margin-bottom: 40px;
    }

    header h1 {
      font-size: 32px;
      font-weight: 700;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }

    header p {
      color: var(--text-muted);
      margin-top: 6px;
      font-size: 16px;
    }

    /* ===== Input Card ===== */
    .input-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 30px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
    }

    .form-group {
      display: flex;
      gap: 12px;
    }

    input[type="text"] {
      flex: 1;
      padding: 14px 18px;
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 15px;
      outline: none;
      transition: all 0.3s;
      background: #0f172a;
      color: white;
    }

    input[type="text"]:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.25);
    }

    .btn {
      background: var(--primary);
      color: white;
      border: none;
      padding: 14px 28px;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }

    .btn:hover {
      background: var(--primary-hover);
    }

    .btn:disabled {
      background: #475569;
      cursor: not-allowed;
    }

    .examples {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 14px;
    }

    .example-btn {
      background: #0f172a;
      border: 1px solid var(--border);
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 12px;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.2s;
    }

    .example-btn:hover {
      border-color: var(--indigo);
      color: white;
      background: rgba(99, 102, 241, 0.1);
    }

    /* ===== Workspace grid ===== */
    .workspace {
      display: grid;
      grid-template-columns: 1.5fr 1fr;
      gap: 24px;
      display: none;
      width: 100%;
    }

    .panel {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
      min-width: 0;
    }

    .step-output {
      word-break: break-all;
      overflow-wrap: anywhere;
      white-space: pre-wrap;
    }

    h2 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      color: white;
      border-bottom: 1px solid var(--border);
      padding-bottom: 8px;
    }

    /* ===== Plan Cards list ===== */
    .plan-list {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .plan-step {
      background: #0f172a;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      display: flex;
      align-items: flex-start;
      gap: 14px;
      transition: all 0.3s;
      position: relative;
    }

    .plan-step.running {
      border-color: var(--warning);
      box-shadow: 0 0 10px rgba(245, 158, 11, 0.15);
    }

    .plan-step.completed {
      border-color: var(--success);
    }

    .step-number {
      background: var(--indigo);
      color: white;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      flex-shrink: 0;
    }

    .plan-step.completed .step-number {
      background: var(--success);
    }

    .plan-step.running .step-number {
      background: var(--warning);
      animation: pulse 1.5s infinite;
    }

    .step-content {
      flex: 1;
    }

    .step-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 4px;
    }

    .step-title {
      font-weight: 600;
      font-size: 14px;
    }

    .step-badge {
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 10px;
      font-weight: 700;
      text-transform: uppercase;
      background: #334155;
    }

    .step-desc {
      font-size: 13px;
      color: var(--text-muted);
    }

    /* ===== Memory / Logs Panel ===== */
    .memory-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      max-height: 480px;
      overflow-y: auto;
    }

    .memory-item {
      background: #0f172a;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
    }

    .memory-header {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      color: var(--indigo);
      margin-bottom: 6px;
    }

    .memory-item pre {
      font-family: 'Consolas', monospace;
      font-size: 11.5px;
      color: #38bdf8;
      overflow-x: auto;
      white-space: pre-wrap;
      word-break: break-all;
      overflow-wrap: anywhere;
    }

    /* ===== Report Card ===== */
    .report-card {
      grid-column: span 2;
      background: linear-gradient(135deg, #1e1b4b 0%, #1e293b 100%);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px;
      margin-top: 24px;
      display: none;
    }

    .report-text {
      font-size: 15px;
      line-height: 1.6;
      white-space: pre-wrap;
    }

    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(245, 158, 11, 0.4); }
      70% { box-shadow: 0 0 0 8px rgba(245, 158, 11, 0); }
      100% { box-shadow: 0 0 0 0 rgba(245, 158, 11, 0); }
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid rgba(245, 158, 11, 0.2);
      border-top-color: var(--warning);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
  <div class="container">
    <header>
      <h1>🤖 Task-Oriented Agent Lab</h1>
      <p>Watch an autonomous agent create plans, execute tools, and build runtime memories</p>
    </header>

    <!-- Task Input Panel -->
    <div class="input-card">
      <div class="form-group">
        <input type="text" id="taskInput" placeholder="Enter a task (e.g. Research the Pythagorean theorem and calculate the hypotenuse of a triangle with sides 3 and 4)...">
        <button class="btn" id="runBtn" onclick="startAgent()">Start Agent</button>
      </div>
      
      <!-- Agent Loader -->
      <div class="agent-loader" id="agentLoader" style="display: none; margin-top: 15px; align-items: center; gap: 10px; color: var(--warning); font-size: 14px; font-weight: 500;">
        <span class="spinner"></span>
        <span id="loaderStatusText">Agent is initializing...</span>
      </div>

      <div class="examples">
        <button class="example-btn" onclick="setExample(this)">Research the Pythagorean theorem and calculate the hypotenuse of a right triangle with sides 3 and 4</button>
        <button class="example-btn" onclick="setExample(this)">Research the invention of the Internet and calculate years since 1989</button>
      </div>
    </div>

    <!-- Agent Workspace -->
    <div class="workspace" id="workspace">
      <!-- Planner console -->
      <div class="panel">
        <h2>📋 Plan & Execution State</h2>
        <div class="plan-list" id="planList"></div>
      </div>

      <!-- Memory console -->
      <div class="panel">
        <h2>🧠 Agent Memory Logs</h2>
        <div class="memory-list" id="memoryList">
          <div style="color: var(--text-muted); font-size: 13px; text-align: center; margin-top: 20px;">Memory is empty. Start the agent to log step outputs.</div>
        </div>
      </div>

      <!-- Final Report -->
      <div class="report-card" id="reportCard">
        <h2>📄 Final Compiled Report</h2>
        <div class="report-text" id="reportText"></div>
      </div>
    </div>
  </div>

  <script>
    function setExample(btn) {
      document.getElementById('taskInput').value = btn.textContent;
    }

    async function startAgent() {
      const taskVal = document.getElementById('taskInput').value.trim();
      const runBtn = document.getElementById('runBtn');
      const workspace = document.getElementById('workspace');
      const planList = document.getElementById('planList');
      const memoryList = document.getElementById('memoryList');
      const reportCard = document.getElementById('reportCard');
      const agentLoader = document.getElementById('agentLoader');
      const loaderStatusText = document.getElementById('loaderStatusText');

      if (!taskVal) return;

      runBtn.disabled = true;
      agentLoader.style.display = 'flex';
      loaderStatusText.textContent = 'Agent is planning execution steps...';
      workspace.style.display = 'grid';
      reportCard.style.display = 'none';
      memoryList.innerHTML = '';
      planList.innerHTML = '<div style="color: var(--text-muted); text-align:center; padding: 20px;">Agent is creating a plan...</div>';

      try {
        // 1. Planning turn: Create the plan
        const planRes = await fetch('/api/agent/plan', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ task: taskVal })
        });
        const planData = await planRes.json();
        
        if (!planRes.ok) throw new Error(planData.error);

        const plan = planData.plan;
        renderPlan(plan);

        // 2. Execution loop
        let memories = [];
        for (let step of plan) {
          // Update UI to running state
          updateStepStatus(step.stepId, 'running');
          loaderStatusText.textContent = `Executing Step ${step.stepId} of ${plan.length}: [${step.tool}]...`;
          await sleep(1500); // Simulate network reasoning delay

          // Execute step
          const stepRes = await fetch('/api/agent/execute-step', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ step, memories })
          });
          const stepData = await stepRes.json();

          if (!stepRes.ok) throw new Error(stepData.error);

          // Update memory log
          memories.push({
            stepId: step.stepId,
            tool: step.tool,
            output: stepData.result
          });

          renderMemories(memories);
          updateStepStatus(step.stepId, 'completed', stepData.result);

          if (step.tool === 'report_writer') {
            document.getElementById('reportText').textContent = stepData.result.report;
            reportCard.style.display = 'block';
          }
        }

      } catch (err) {
        alert('Agent execution failed: ' + err.message);
      } finally {
        runBtn.disabled = false;
        agentLoader.style.display = 'none';
      }
    }

    function renderPlan(plan) {
      const planList = document.getElementById('planList');
      planList.innerHTML = '';
      plan.forEach(step => {
        planList.innerHTML += `
          <div class="plan-step" id="step-${step.stepId}">
            <div class="step-number">${step.stepId}</div>
            <div class="step-content">
              <div class="step-header">
                <span class="step-title">Step ${step.stepId}</span>
                <span class="step-badge">${step.tool}</span>
              </div>
              <div class="step-desc">${step.description}</div>
              <div class="step-output" id="step-output-${step.stepId}" style="margin-top: 10px; font-size:12px; font-family:monospace; color:#38bdf8; display:none;"></div>
            </div>
          </div>`;
      });
    }

    function updateStepStatus(stepId, status, result = null) {
      const el = document.getElementById(`step-${stepId}`);
      if (!el) return;

      el.className = `plan-step ${status}`;
      if (status === 'completed' && result) {
        const outputEl = document.getElementById(`step-output-${stepId}`);
        outputEl.textContent = `Result: ${JSON.stringify(result)}`;
        outputEl.style.display = 'block';
      }
    }

    function renderMemories(memories) {
      const memoryList = document.getElementById('memoryList');
      memoryList.innerHTML = '';
      memories.forEach(mem => {
        memoryList.innerHTML += `
          <div class="memory-item">
            <div class="memory-header">Step ${mem.stepId} Memory (${mem.tool})</div>
            <pre>${JSON.stringify(mem.output, null, 2)}</pre>
          </div>`;
      });
    }

    function sleep(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }
  </script>
</body>

</html>
