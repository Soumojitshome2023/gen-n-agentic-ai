<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Prompt Playground</title>
  <style>
    body {
      font-family: sans-serif;
      padding: 20px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .controls,
    .results {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    textarea {
      width: 100%;
      height: 150px;
    }

    #jsonOutput {
      background: #1e1e1e;
      color: #00ff00;
      padding: 10px;
      height: 300px;
      overflow-y: auto;
      font-family: monospace;
      border-radius: 5px;
      width: 100%;
      box-sizing: border-box;
      max-width: 800px;
    }

    #textOutput {
      border: 1px solid #ccc;
      padding: 10px;
      height: 100px;
      overflow-y: auto;
      width: 100%;
      box-sizing: border-box;
      max-width: 800px;
    }

    #historyList li {
      cursor: pointer;
      color: #1a73e8;
      text-decoration: underline;
      margin-bottom: 5px;
    }
  </style>
</head>

<body>
  <div class="controls">
    <h2>Prompt Playground</h2>
    <textarea id="promptInput" placeholder="Enter your prompt..."></textarea>
    <label>Temperature: <input type="range" id="temp" min="0" max="2" step="0.1" value="0.7"> <span
        id="tempVal">0.7</span></label>
    <label>Max Tokens: <input type="number" id="maxTokens" value="1000"></label>
    <label>Top-P: <input type="range" id="topP" min="0" max="1" step="0.1" value="0.95"> <span
        id="topPVal">0.95</span></label>
    <button id="runBtn">Run Prompt</button>
    <h3>History</h3>
    <ul id="historyList"></ul>
  </div>
  <div class="results">
    <h3>AI Response</h3>
    <div id="textOutput"></div>
    <h3>Raw JSON Inspection</h3>
    <pre id="jsonOutput"></pre>
  </div>

  <script>
    const renderHistory = () => {
      const historyList = document.getElementById('historyList');
      const history = JSON.parse(localStorage.getItem('promptHistory') || '[]');
      historyList.innerHTML = '';
      history.forEach(item => {
        const li = document.createElement('li');
        li.innerText = item.length > 30 ? item.substring(0, 30) + '...' : item;
        li.onclick = () => document.getElementById('promptInput').value = item;
        historyList.appendChild(li);
      });
    };

    window.onload = renderHistory;

    document.getElementById('temp').oninput = (e) => document.getElementById('tempVal').innerText = e.target.value;
    document.getElementById('topP').oninput = (e) => document.getElementById('topPVal').innerText = e.target.value;

    document.getElementById('runBtn').addEventListener('click', async () => {
      document.getElementById('textOutput').innerText = 'Loading...';
      document.getElementById('jsonOutput').innerText = 'Loading...';
      const payload = {
        prompt: document.getElementById('promptInput').value,
        temperature: parseFloat(document.getElementById('temp').value),
        maxTokens: parseInt(document.getElementById('maxTokens').value),
        topP: parseFloat(document.getElementById('topP').value)
      };

      const history = JSON.parse(localStorage.getItem('promptHistory') || '[]');
      history.push(payload.prompt);
      localStorage.setItem('promptHistory', JSON.stringify(history.slice(-5)));
      renderHistory();

      const res = await fetch('/api/generate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      const data = await res.json();

      document.getElementById('textOutput').innerText = data.response;
      document.getElementById('jsonOutput').innerText = JSON.stringify(data, null, 2);
    });
  </script>
</body>

</html>
